name: pages-auto-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-auto-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Skip deploy when Cloudflare secrets are missing
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' }}
        run: echo "Cloudflare secrets are not configured; skipping Pages deploy."
      - name: Ensure Cloudflare Pages project exists
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: |
          set -euo pipefail
          if ! npx wrangler@4.71.0 pages project create stage-pilot --production-branch=main >/tmp/cf_pages_create.log 2>&1; then
            grep -qi "already exists" /tmp/cf_pages_create.log || (cat /tmp/cf_pages_create.log && exit 1)
          fi
      - name: Deploy static site
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: npx wrangler@4.71.0 pages deploy site --project-name=stage-pilot --branch=main --commit-dirty=true
