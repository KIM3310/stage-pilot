  <text x="48" y="90" fill="#7DD3FC" font-family="Arial, sans-serif" font-size="14">parser -&gt; stagepilot orchestration -&gt; benchlab evidence</text>

  <rect x="48" y="126" width="268" height="132" rx="16" fill="#121B2A" stroke="#00E5FF"/>
