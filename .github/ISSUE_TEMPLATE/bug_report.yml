name: Bug Report
description: Report a bug in StagePilot or @ai-sdk-tool/parser
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: Package Version
      description: "Which version of @ai-sdk-tool/parser or StagePilot are you using?"
      placeholder: "e.g., 4.1.3"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: "Which part of the project does this bug affect?"
      options:
        - "@ai-sdk-tool/parser (middleware)"
        - "StagePilot runtime (orchestration)"
        - "BenchLab (experiments)"
        - "API server"
        - "Documentation"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: "A clear and concise description of what the bug is."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: "Provide a minimal set of steps to reproduce the issue."
      placeholder: |
        1. Install package with `pnpm add @ai-sdk-tool/parser`
        2. Configure middleware with ...
        3. Call `streamText()` with ...
        4. Observe error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: "What actually happened? Include error messages or logs if available."
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      placeholder: "e.g., 22.0.0"

  - type: input
    id: ai-sdk-version
    attributes:
      label: AI SDK Version
      placeholder: "e.g., 6.0.97"

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: "Any other context, screenshots, or log output that might help."
