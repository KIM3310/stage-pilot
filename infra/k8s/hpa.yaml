apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: stagepilot-api
  namespace: stagepilot
  labels:
    app: stagepilot-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: stagepilot-api
  minReplicas: 2
  maxReplicas: 10
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    - type: Pods
      pods:
        metric:
          name: stagepilot_request_latency_ms
        target:
          type: AverageValue
          averageValue: "500"
