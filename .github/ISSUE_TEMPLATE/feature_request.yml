name: Feature Request
description: Suggest a new feature or improvement for StagePilot
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature. Please describe the problem you are trying to solve and the solution you have in mind.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: "Which part of the project does this feature relate to?"
      options:
        - "@ai-sdk-tool/parser (middleware)"
        - "StagePilot runtime (orchestration)"
        - "BenchLab (experiments)"
        - "API server"
        - "Deployment / Infrastructure"
        - "Documentation"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: "Describe the problem or limitation you are facing. What workflow is blocked or painful?"
      placeholder: "I frequently need to ... but currently ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: "Describe the solution you would like to see."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: "Have you considered any alternative approaches? What are their trade-offs?"

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: "Any additional context, mockups, or references that help illustrate the feature."
